<!DOCTYPE html>
<html>
<head>
  <title>UniDown - Downloader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">⚡ UniDown</div>
  <button onclick="toggleTheme()" class="theme-btn">🌙</button>
</header>

<!-- MAIN -->
<div class="main">

  <div class="card">
    <h2>Download Any Video Instantly</h2>

    <input type="text" id="url" placeholder="Paste video link here...">

    <div class="options">
      <select id="format">
        <option value="mp4">🎬 MP4</option>
        <option value="mp3">🎵 MP3</option>
      </select>

      <select id="quality">
        <option value="best">Best</option>
        <option value="720">720p</option>
        <option value="480">480p</option>
        <option value="360">360p</option>
      </select>
    </div>

    <button onclick="getVideo()" class="download-btn">
      ⚡ Fetch Video
    </button>

    <div id="loader" class="loader"></div>
    <div id="result"></div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
